name: "CD - Deploy to AWS"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.4"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    name: "Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          config_file: checkov/.checkov.yaml
          soft_fail: false

  plan:
    name: "Plan (${{ github.ref_name == 'main' && 'production' || 'dev' }})"
    runs-on: ubuntu-latest
    needs: security
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config="key=${{ github.ref_name == 'main' && 'production' || 'dev' }}/terraform.tfstate"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="ip=${{ secrets.IP }}" \
            -no-color \
            -input=false \
            -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.ref_name == 'main' && 'production' || 'dev' }}
          path: tfplan
          retention-days: 1

  apply:
    name: "Apply (${{ github.ref_name == 'main' && 'production' || 'dev' }})"
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config="key=${{ github.ref_name == 'main' && 'production' || 'dev' }}/terraform.tfstate"

      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.ref_name == 'main' && 'production' || 'dev' }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Show Outputs
        run: terraform output