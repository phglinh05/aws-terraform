name: "Destroy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Go "destroy" de xac nhan xoa toan bo ha tang'
        required: true
        type: string

env:
  TF_VERSION: "1.11.4"
  AWS_REGION: "us-east-1"

jobs:
  confirm:
    name: "Confirm Destroy"
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "Sai xac nhan. Phai go 'destroy' de tiep tuc."
            exit 1
          fi
          echo "Xac nhan hop le. Tiep tuc destroy ha tang."

  plan-destroy:
    name: "Plan Destroy"
    runs-on: ubuntu-latest
    needs: confirm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan Destroy
        run: |
          terraform plan \
            -destroy \
            -var="ip=${{ secrets.IP }}" \
            -var="key_name=${{ secrets.KEY_NAME }}" \
            -no-color \
            -out=tfplan-destroy

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy
          path: tfplan-destroy
          retention-days: 1

  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: plan-destroy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download destroy plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-destroy

      - name: Terraform Destroy
        run: terraform apply -auto-approve tfplan-destroy

      - name: Confirm destroyed
        run: echo "Toan bo ha tang da bi xoa."