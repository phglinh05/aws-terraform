name: "Destroy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Moi truong can destroy"
        required: true
        type: choice
        options:
          - dev
          - production
      confirm:
        description: 'Go "destroy" de xac nhan xoa toan bo ha tang'
        required: true
        type: string

env:
  TF_VERSION: "1.11.4"
  AWS_REGION: "us-east-1"

jobs:
  confirm:
    name: "Confirm Destroy"
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "Sai xac nhan. Phai go 'destroy' de tiep tuc."
            exit 1
          fi
          echo "Xac nhan hop le. Tiep tuc destroy moi truong: ${{ github.event.inputs.environment }}"

  plan-destroy:
    name: "Plan Destroy (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    needs: confirm
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan Destroy
        run: |
          terraform plan \
            -destroy \
            -var="ip=${{ secrets.IP }}" \
            -var-file=env/${{ github.event.inputs.environment }}.tfvars \
            -no-color \
            -out=tfplan-destroy

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy
          path: tfplan-destroy
          retention-days: 1

  destroy:
    name: "Terraform Destroy (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    needs: plan-destroy
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Download destroy plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-destroy

      - name: Terraform Destroy
        run: terraform apply -auto-approve tfplan-destroy

      - name: Confirm destroyed
        run: echo "Toan bo ha tang moi truong ${{ github.event.inputs.environment }} da bi xoa."